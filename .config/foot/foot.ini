[main]
# Typography - Uses JetBrains Mono Nerd Font for text and icons
font=JetBrainsMono Nerd Font:size=11
# Set window size using standard initial character geometry
initial-window-size-chars=100x28
# Padding around terminal edges for a clean layout
pad=12x12
# Default shell execution
shell=/usr/bin/zsh

[cursor]
# Clean, non-blinking block cursor matching the minimalist setup
style=block
blink=no

[scrollback]
# Increases buffer memory for long terminal sessions
lines=10000
multiplier=3.0

[url]
# Instant URL opening functionality via keyboard shortcuts
launch=xdg-open ${url}


[colors-dark]
# The core deep black layout theme
background=0d0d0d
foreground=e6e6e6
alpha = 0.9

# Cursor coloring inside the color profiles block
cursor=ffffff ffffff

## Normal terminal colors (0-7)
regular0=1a1a1a       # Black (Soft)
regular1=ff5c5c       # Red
regular2=5dfabe       # Green
regular3=f0f283       # Yellow
regular4=75aaff       # Blue
regular5=b388ff       # Magenta
regular6=00e5ff       # Cyan
regular7=e6e6e6       # White

## Bright terminal colors (8-15)
bright0=4d4d4d        # Bright Black (Gray)
bright1=ff8585        # Bright Red
bright2=87ffcf        # Bright Green
bright3=f4f69c        # Bright Yellow
bright4=a1c4ff        # Bright Blue
bright5=d1b5ff        # Bright Magenta
bright6=66f0ff        # Bright Cyan
bright7=ffffff        # Bright White

# FIXED: Changed section name from [keybindings] to [key-bindings]
[key-bindings]
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
font-increase=Control+Shift+plus Control+Shift+equal
font-decrease=Control+minus
font-reset=Control+0
# FIXED: Updated shortcut to 'o' to comply with modern defaults
show-urls-launch=Control+Shift+o

